name: release

# Builds Siphon installers for Windows, macOS (Intel + Apple Silicon) and Linux,
# then attaches them to a GitHub Release.
#
# Usage: push a version tag, e.g.
#   git tag v1.0.0 && git push origin v1.0.0
# A *draft* release is created with all the installers attached — review it, then
# publish. You can also run it manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (arm64) -> .dmg
            args: '--target aarch64-apple-darwin'
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest      # Intel (x86_64) -> .dmg
            args: '--target x86_64-apple-darwin'
            rust_targets: x86_64-apple-darwin
          - platform: ubuntu-22.04      # Linux -> .AppImage / .deb / .rpm
            args: ''
            rust_targets: ''
          - platform: windows-latest    # Windows -> NSIS .exe + MSI
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libssl-dev libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Siphon __VERSION__'
          releaseBody: |
            ### Siphon __VERSION__

            Download the installer for your platform below.

            - **Windows:** `Siphon___VERSION___x64-setup.exe` (recommended) or the `.msi`
            - **macOS:** the `.dmg` matching your chip (Apple Silicon or Intel)
            - **Linux:** the `.AppImage` (portable) or `.deb` / `.rpm`

            > Siphon is for lawful, personal use only. See DISCLAIMER.md.
            > Windows/macOS builds are unsigned — you may need to bypass SmartScreen / Gatekeeper.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
